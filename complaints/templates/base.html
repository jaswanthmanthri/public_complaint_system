<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CivicConnect{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2D5A27; /* Forest Green */
            --primary-hover: #1E3F20;
            --accent-color: #F5A623; /* Warm Yellow */
            --accent-hover: #D98C15;
            --secondary-color: #F8FAF7; /* Very light green-gray */
            --text-color: #1F2937; /* Gray 800 */
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --bg-color: #FAFAFA;
        }
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        header {
            background: linear-gradient(135deg, var(--primary-color), #437A3C);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        header h2 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        header a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }
        header a:hover {
            opacity: 0.8;
            text-decoration: none;
        }
        .container {
            max-width: 850px;
            margin: 3rem auto;
            padding: 2.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 { color: var(--text-color); font-weight: 700; }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }
        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .alert {
            padding: 1rem;
            background-color: #D1FAE5;
            color: #065F46;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header>
        <div>
            <h2><a href="{% url 'home' %}" style="margin-left: 0;">CivicConnect</a></h2>
        </div>
        <nav>
            {% if user.is_authenticated %}
                <span style="font-weight: 300;">Welcome, <strong>{{ user.username }}</strong></span>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:none;border:none;color:white;font-weight:600;cursor:pointer;font-size:1rem;margin-left:1.5rem;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" style="background: white; color: var(--primary-color); padding: 0.5rem 1rem; border-radius: 4px;">Register</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 CivicConnect. Empowering citizens, improving communities.</p>
    </footer>

    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
          duration: 800,
          once: true,
      });
    </script>
</body>
</html>
